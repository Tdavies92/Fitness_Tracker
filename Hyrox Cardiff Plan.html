<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyrox Cardiff — Race Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff3a;
    --accent2: #ff4d2e;
    --text: #f0f0f0;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    padding: 40px 40px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 7vw, 84px);
    line-height: 0.9;
    letter-spacing: 2px;
  }

  .header-left h1 span { color: var(--accent); }

  .header-left p {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .countdown-block {
    background: var(--surface);
    border: 1px solid var(--accent);
    padding: 20px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .countdown-block::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(232,255,58,0.05));
  }

  .countdown-block .days {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    color: var(--accent);
    line-height: 1;
  }

  .countdown-block .days-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  .countdown-block .race-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text);
    letter-spacing: 1px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .header-stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 18px;
    min-width: 88px;
    text-align: center;
  }

  .stat-box .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-box .label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Timeline strip */
  .timeline {
    display: flex;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .tl-week {
    flex: 1;
    min-width: 90px;
    padding: 12px 16px;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .tl-week:last-child { border-right: none; }
  .tl-week:hover { background: var(--surface); }
  .tl-week.active { background: var(--surface); }

  .tl-week.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .tl-week.phase-build { border-top: 3px solid #7f7fff; }
  .tl-week.phase-peak { border-top: 3px solid #ff9f7f; }
  .tl-week.phase-taper { border-top: 3px solid var(--accent); }
  .tl-week.phase-race { border-top: 3px solid var(--accent2); }

  .tl-week .tl-wnum {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    line-height: 1;
  }

  .tl-week.phase-build .tl-wnum { color: #7f7fff; }
  .tl-week.phase-peak .tl-wnum { color: #ff9f7f; }
  .tl-week.phase-taper .tl-wnum { color: var(--accent); }
  .tl-week.phase-race .tl-wnum { color: var(--accent2); }

  .tl-week .tl-dates {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .tl-week .tl-phase {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }

  .tl-pips {
    display: flex;
    gap: 2px;
    margin-top: 5px;
  }

  .tl-pip {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
  }

  .tl-pip.done { background: var(--accent); }
  .tl-pip.missed { background: var(--accent2); }

  /* THIS WEEK banner */
  .this-week-badge {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #000;
    background: var(--accent);
    padding: 2px 5px;
    display: inline-block;
    margin-bottom: 3px;
  }

  main {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 240px);
  }

  .week-nav {
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    position: sticky;
    top: 0;
    max-height: calc(100vh - 240px);
  }

  .week-nav-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 0 20px 10px;
  }

  .week-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }

  .week-item:hover { background: var(--surface); }
  .week-item.active { border-left-color: var(--accent); background: var(--surface); }

  .week-item .wnum {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--muted);
    width: 36px;
    flex-shrink: 0;
  }

  .week-item.active .wnum { color: var(--accent); }
  .week-item.phase-build .wnum { color: #7f7fff; }
  .week-item.phase-peak .wnum { color: #ff9f7f; }
  .week-item.phase-taper .wnum { color: var(--accent); }
  .week-item.phase-race .wnum { color: var(--accent2); }

  .week-item .winfo { flex: 1; }

  .week-item .wphase {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .week-item .wdates {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-top: 1px;
  }

  .week-item .wprogress {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }

  .wpip {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }

  .wpip.done { background: var(--accent); }
  .wpip.missed { background: var(--accent2); }

  .content { padding: 28px 36px; overflow-y: auto; }

  .week-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .week-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 46px;
    line-height: 1;
    letter-spacing: 1px;
  }

  .week-date-range {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    align-self: center;
  }

  .week-phase-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 10px;
    border: 1px solid currentColor;
  }

  .phase-build .week-phase-badge, .week-phase-badge.build { color: #7f7fff; }
  .phase-peak .week-phase-badge, .week-phase-badge.peak { color: #ff9f7f; }
  .phase-taper .week-phase-badge, .week-phase-badge.taper { color: var(--accent); }
  .week-phase-badge.race { color: var(--accent2); }

  .week-focus {
    font-size: 12px;
    color: var(--muted);
    flex: 1;
    font-style: italic;
    margin-left: auto;
    text-align: right;
    align-self: center;
  }

  .current-week-banner {
    background: rgba(232,255,58,0.08);
    border: 1px solid var(--accent);
    padding: 10px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .current-week-banner::before { content: '▶'; font-size: 10px; }

  .sessions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }

  .session-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px;
    position: relative;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .session-card:hover { border-color: var(--muted); }
  .session-card.done { border-color: var(--accent); }
  .session-card.missed { border-color: var(--accent2); }
  .session-card.rest { opacity: 0.55; cursor: default; }

  .session-card.done::after {
    content: '✓';
    position: absolute; top: 10px; right: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; color: var(--accent);
  }

  .session-card.missed::after {
    content: '✗';
    position: absolute; top: 10px; right: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; color: var(--accent2);
  }

  .session-day {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 6px;
  }

  .session-date-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: var(--muted);
    float: right; margin-top: -1px;
  }

  .session-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 0.5px;
    margin-bottom: 5px; color: var(--text);
    line-height: 1.1;
  }

  .session-type {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 8px; letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 7px; border: 1px solid;
    margin-bottom: 9px;
  }

  .session-type.strength { color: #ff9f7f; border-color: #ff9f7f44; background: #ff9f7f11; }
  .session-type.metcon { color: #ff7fbf; border-color: #ff7fbf44; background: #ff7fbf11; }
  .session-type.running { color: #7fffff; border-color: #7fffff44; background: #7fffff11; }
  .session-type.hyrox { color: #7fff7f; border-color: #7fff7f44; background: #7fff7f11; }
  .session-type.aerobic { color: #7f7fff; border-color: #7f7fff44; background: #7f7fff11; }
  .session-type.recovery { color: var(--muted); border-color: #44444444; background: #44444411; }

  .session-detail {
    font-size: 11px; color: var(--muted);
    line-height: 1.5; margin-bottom: 10px;
  }

  .session-meta {
    display: flex; gap: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: var(--muted);
  }

  .session-actions {
    display: flex; gap: 8px;
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .btn {
    flex: 1; padding: 7px 0;
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }

  .btn:hover { border-color: var(--muted); color: var(--text); }
  .btn.btn-done { border-color: var(--accent); color: var(--accent); }
  .btn.btn-done:hover { background: var(--accent); color: #000; }
  .btn.btn-missed { border-color: var(--accent2); color: var(--accent2); }
  .btn.btn-missed:hover { background: var(--accent2); color: #fff; }

  .wendler-section {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 22px;
    margin-bottom: 16px;
  }

  .wendler-section h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .wendler-lifts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .lift-block {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 14px;
  }

  .lift-block h4 {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px;
  }

  .tm-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
  }

  .tm-row label { min-width: 80px; font-size: 9px; letter-spacing: 1px; }

  .tm-row input[type="number"] {
    width: 75px; background: var(--surface);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 13px; padding: 5px 9px;
    outline: none; transition: border-color 0.2s;
  }

  .tm-row input:focus { border-color: var(--accent); }

  .lift-sets { display: flex; flex-direction: column; gap: 5px; }

  .lift-set {
    display: flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
  }

  .lift-set .set-label { min-width: 60px; font-size: 9px; }

  .lift-set input[type="number"] {
    width: 60px; background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px; padding: 4px 7px; outline: none;
  }

  .amrap-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 6px; padding-top: 6px;
    border-top: 1px dashed var(--border);
  }

  .amrap-row label {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 1px;
    color: var(--accent); min-width: 80px;
  }

  .amrap-row input {
    width: 55px; background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px; padding: 4px 7px; outline: none;
  }

  .notes-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 20px;
  }

  .notes-area h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px; letter-spacing: 1px;
    margin-bottom: 10px; color: var(--muted);
  }

  .notes-area textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px; line-height: 1.6;
    padding: 10px 12px;
    resize: vertical; min-height: 72px;
    outline: none; transition: border-color 0.2s;
  }

  .notes-area textarea:focus { border-color: var(--accent); }

  /* Race day card */
  .race-day-card {
    background: var(--surface);
    border: 2px solid var(--accent2);
    padding: 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .race-day-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,77,46,0.08) 0%, transparent 70%);
  }

  .race-day-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px; letter-spacing: 3px;
    color: var(--accent2);
    line-height: 1;
  }

  .race-day-card p {
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--muted);
    letter-spacing: 2px; margin-top: 8px;
  }

  .race-day-card .race-tips {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    text-align: left;
  }

  .race-tip {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 12px 14px;
  }

  .race-tip h4 {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent2); margin-bottom: 6px;
  }

  .race-tip p {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0; line-height: 1.5;
    font-family: 'DM Sans', sans-serif;
  }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
    .week-nav { display: none; }
    .content { padding: 16px; }
    header { padding: 20px 16px; }
    .wendler-lifts { grid-template-columns: 1fr; }
    .sessions-grid { grid-template-columns: 1fr; }
    .race-day-card .race-tips { grid-template-columns: 1fr; }
  }

  .fade-in {
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1>HYROX<br><span>CARDIFF</span></h1>
    <p>Partner Open — Final 6 Weeks · Race: 1 May 2026</p>
  </div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
    <div class="countdown-block">
      <div class="days" id="days-remaining">—</div>
      <div class="days-label">Days to Race</div>
      <div class="race-date">Thursday, 1 May 2026</div>
    </div>
    <div class="header-stats">
      <div class="stat-box">
        <div class="num" id="stat-done">0</div>
        <div class="label">Sessions<br>Done</div>
      </div>
      <div class="stat-box">
        <div class="num" id="stat-weeks">0</div>
        <div class="label">Weeks<br>Complete</div>
      </div>
      <div class="stat-box">
        <div class="num" id="stat-pct">0%</div>
        <div class="label">Plan<br>Progress</div>
      </div>
    </div>
  </div>
</header>

<div class="timeline" id="timeline-bar"></div>

<main>
  <aside class="week-nav">
    <div class="week-nav-label">Remaining Weeks</div>
    <div id="week-nav-list"></div>
  </aside>
  <div class="content" id="main-content"></div>
</main>

<script>
// ---- PLAN DATA ----
// Original plan weeks 5-10, starting Mon 23 March 2026
// Week 5 = Mon 23 Mar | Week 6 = Mon 30 Mar | Week 7 = Mon 6 Apr
// Week 8 = Mon 13 Apr | Week 9 = Mon 20 Apr | Week 10 = Mon 27 Apr
// Race Day: Thu 1 May 2026

const RACE_DATE = new Date('2026-05-01');

function getWeekStartDate(planWeek) {
  // Week 5 starts 23 March 2026
  const base = new Date('2026-03-23');
  const offset = (planWeek - 5) * 7;
  const d = new Date(base);
  d.setDate(d.getDate() + offset);
  return d;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

function fmtDateShort(d) {
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}

const PHASES = { 5:'build', 6:'build', 7:'peak', 8:'peak', 9:'peak', 10:'taper' };

const PHASE_LABELS = { build:'Build', peak:'Peak', taper:'Taper' };

const PHASE_FOCUS = {
  build: 'Volume up — race-sim sessions, push harder, heavier loads',
  peak: 'Sharpen race pace, full Hyrox sim with partner, practice transitions',
  taper: 'Freshen up. Trust the training. Race-pace bursts only.'
};

const PHASE_COLOURS = { build:'#7f7fff', peak:'#ff9f7f', taper:'#e8ff3a', race:'#ff4d2e' };

// Wendler wave positions for remaining weeks (continuing from week 4)
const WENDLER_WAVES = {
  '5/5/5+': { sets:[{reps:5,pct:65},{reps:5,pct:75},{reps:'5+',pct:85}] },
  '3/3/3+': { sets:[{reps:3,pct:70},{reps:3,pct:80},{reps:'3+',pct:90}] },
  '5/3/1+': { sets:[{reps:5,pct:75},{reps:3,pct:85},{reps:'1+',pct:95}] },
  'Deload':  { sets:[{reps:5,pct:40},{reps:5,pct:50},{reps:5,pct:60}] },
  'Deload (light)': { sets:[{reps:3,pct:40},{reps:3,pct:50},{reps:3,pct:60}] }
};

// Each lift pair tracks its own 4-week wave
// Squat/Bench: week 1(5/5/5+) 3(3/3/3+) 5(5/3/1+) 7(Deload→5/5/5+) 9(3/3/3+)
// DL/Press:    week 2(5/5/5+) 4(3/3/3+) 6(5/3/1+) 8(Deload→5/5/5+) 10(3/3/3+)
const LIFT_WAVE = {
  5:  { pair:'A', lifts:['Squat','Bench Press'],      wave:'5/3/1+',      note:'AMRAP top sets — peak of this cycle', accessory:'Goblet Squats, DB Press, Lat Pulldowns' },
  6:  { pair:'B', lifts:['Deadlift','Overhead Press'],wave:'5/3/1+',      note:'AMRAP top sets — peak of this cycle', accessory:'Romanian DLs, DB Rows, Face Pulls' },
  7:  { pair:'A', lifts:['Squat','Bench Press'],      wave:'5/5/5+',      note:'Fresh cycle — establish new TMs, solid reps', accessory:'Goblet Squats, DB Press, Lat Pulldowns' },
  8:  { pair:'B', lifts:['Deadlift','Overhead Press'],wave:'5/5/5+',      note:'Fresh cycle — establish new TMs, solid reps', accessory:'Romanian DLs, DB Rows, Face Pulls' },
  9:  { pair:'A', lifts:['Squat','Bench Press'],      wave:'3/3/3+',      note:'Week 2 of new cycle — push the top sets', accessory:'Goblet Squats, DB Press, Lat Pulldowns' },
  10: { pair:'AB', lifts:['Squat','Bench Press','Deadlift','Overhead Press'], wave:'Deload', note:'Race week deload — both pairs, keep it light and crisp. No grinding.', accessory:'Light accessory only, no fatigue' }
};

const RUN_SESSIONS = {
  build: { name:'Tempo Intervals',      detail:'5 min warm-up, then 4–5 × 1km at target race pace (4:45–5:15/km) with 90 sec jog recovery. Cool-down 5 min.', rpe:'7–8', dur:'35–50 min' },
  peak:  { name:'Brick Running',         detail:'2–3 Hyrox stations (e.g. sled push + farmers carry), then immediately 1km at race pace. Repeat 3–4 rounds. Trains running on fatigued legs.', rpe:'7–8', dur:'40–55 min' },
  taper: { name:'Race-Pace Shakeout',    detail:'15–20 min easy with 3–4 × 200m strides at race pace. Stay sharp, don\'t fatigue.', rpe:'5–6', dur:'20–25 min' }
};

const SAT_SESSIONS = {
  build: { name:'Long Run',           detail:'Easy to moderate continuous run. Build aerobic base and time on feet. Conversational pace throughout — no racing. 8–12km depending on how the week has felt.', rpe:'5–6', dur:'50–70 min' },
  peak:  { name:'Long Run',           detail:'Steady long run with the final 15–20 min pushed closer to race pace. Gets you comfortable running on fatigued legs after a hard week. 10–14km.', rpe:'6–7', dur:'60–80 min' },
  taper: { name:'Easy Shakeout Run',  detail:'Short easy run to keep the legs ticking over. No pressure — just stay loose and fresh ahead of race week. 4–6km at a comfortable pace.', rpe:'4–5', dur:'25–35 min' }
};

function getWeekSessions(week) {
  const phase = PHASES[week];
  const liftData = LIFT_WAVE[week];
  const waveName = liftData.wave.replace(' (keep crisp, no PRs)','');
  const waveData = WENDLER_WAVES[waveName] || WENDLER_WAVES['Deload'];
  const runData = RUN_SESSIONS[phase];
  const satData = SAT_SESSIONS[phase];
  const isTaper = phase === 'taper';
  const weekStart = getWeekStartDate(week);

  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dates = days.map((_,i) => addDays(weekStart, i));

  return [
    {
      id:'mon', day:'Monday', date: fmtDate(dates[0]),
      name:'Wendler Lift',
      detail:`${liftData.lifts.join(' + ')} — ${liftData.wave}. ${liftData.note}. Accessory: ${liftData.accessory}.`,
      type:'strength', rpe:'7–8', duration:'60–75 min', rest:false
    },
    {
      id:'tue', day:'Tuesday', date: fmtDate(dates[1]),
      name: isTaper ? 'CrossFit (1 max)' : 'CrossFit Class',
      detail: isTaper ? '1 class max. Keep it fun and fresh. Don\'t chase intensity.' : 'Engine & GPP — push the WOD hard. Partner WODs where possible.',
      type:'metcon', rpe: isTaper ? '6–7' : '7–8', duration:'60 min', rest:false
    },
    {
      id:'wed', day:'Wednesday', date: fmtDate(dates[2]),
      name: runData.name,
      detail: runData.detail,
      type:'running', rpe: runData.rpe, duration: runData.dur, rest:false
    },
    {
      id:'thu', day:'Thursday', date: fmtDate(dates[3]),
      name: isTaper ? 'Light Hyrox Class' : 'Hyrox Class',
      detail: isTaper ? 'Short race-pace bursts only. Station technique, stay sharp. Prioritise transitions.' : 'Station technique + race sim. Running between stations. Partner comms and transition practice.',
      type:'hyrox', rpe: isTaper ? '5–6' : '7–8', duration:'60 min', rest:false
    },
    {
      id:'fri', day:'Friday', date: fmtDate(dates[4]),
      name:'Rest / Active Recovery',
      detail:'Light walk, mobility, foam rolling. Absorb the week\'s training load.',
      type:'recovery', rpe:'2–3', duration:'0–30 min', rest:true
    },
    {
      id:'sat', day:'Saturday', date: fmtDate(dates[5]),
      name: satData.name,
      detail: satData.detail,
      type:'running', rpe: satData.rpe, duration: satData.dur, rest:false
    },
    {
      id:'sun', day:'Sunday', date: fmtDate(dates[6]),
      name:'Rest / Active Recovery',
      detail:'Full recovery, mobility, mental reset. Light walk, foam roll, sauna.',
      type:'recovery', rpe:'2–3', duration:'0–30 min', rest:true
    }
  ];
}

function getCurrentPlanWeek() {
  const today = new Date();
  today.setHours(0,0,0,0);
  for (let w = 5; w <= 10; w++) {
    const start = getWeekStartDate(w);
    const end = addDays(start, 6);
    if (today >= start && today <= end) return w;
  }
  if (today > addDays(getWeekStartDate(10),6)) return 'race';
  return 5;
}

// ---- STATE ----
let state = {};

function loadState() {
  try {
    const saved = localStorage.getItem('hyrox_cardiff_6wk_v1');
    if (saved) state = JSON.parse(saved);
  } catch(e) { state = {}; }
  for (let w = 5; w <= 10; w++) {
    if (!state[w]) state[w] = { sessions:{}, notes:'', wendler:{} };
    if (!state[w].sessions) state[w].sessions = {};
    if (!state[w].notes) state[w].notes = '';
    if (!state[w].wendler) state[w].wendler = {};
  }
}

function saveState() {
  try {
    localStorage.setItem('hyrox_cardiff_6wk_v1', JSON.stringify(state));
  } catch(e) {}
  updateStats();
  renderWeekNav();
  renderTimeline();
}

function setSession(week, sid, status) {
  state[week].sessions[sid] = status;
  saveState();
  renderContent(currentWeek);
}

function setNote(week, val) { state[week].notes = val; saveState(); }
function setWendler(week, key, val) { state[week].wendler[key] = val; saveState(); }

// ---- STATS ----
let currentWeek = 5;

function countDone(week) {
  return getWeekSessions(week).filter(s => !s.rest && state[week]?.sessions?.[s.id] === 'done').length;
}

function totalTrainingDays(week) {
  return getWeekSessions(week).filter(s => !s.rest).length;
}

function updateDaysRemaining() {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.ceil((RACE_DATE - today) / 86400000);
  document.getElementById('days-remaining').textContent = Math.max(0, diff);
}

function updateStats() {
  let totalDone = 0, totalPossible = 0, weeksComplete = 0;
  for (let w = 5; w <= 10; w++) {
    const done = countDone(w);
    const total = totalTrainingDays(w);
    totalDone += done;
    totalPossible += total;
    if (done === total) weeksComplete++;
  }
  document.getElementById('stat-done').textContent = totalDone;
  document.getElementById('stat-weeks').textContent = weeksComplete;
  document.getElementById('stat-pct').textContent = totalPossible > 0
    ? Math.round((totalDone / totalPossible) * 100) + '%' : '0%';
}

function renderTimeline() {
  const bar = document.getElementById('timeline-bar');
  const curW = getCurrentPlanWeek();
  let html = '';
  for (let w = 5; w <= 10; w++) {
    const phase = PHASES[w];
    const start = getWeekStartDate(w);
    const end = addDays(start, 6);
    const isActive = w === currentWeek;
    const isCurrentReal = w === curW;
    const sessions = getWeekSessions(w).filter(s => !s.rest);
    const pips = sessions.map(s => {
      const st = state[w]?.sessions?.[s.id] || 'none';
      return `<div class="tl-pip${st==='done'?' done':st==='missed'?' missed':''}"></div>`;
    }).join('');
    html += `
      <div class="tl-week phase-${phase}${isActive?' active':''}" onclick="goToWeek(${w})">
        ${isCurrentReal ? '<div class="this-week-badge">This Week</div>' : ''}
        <div class="tl-wnum">W${w}</div>
        <div class="tl-dates">${fmtDateShort(start)} – ${fmtDateShort(end)}</div>
        <div class="tl-phase">${PHASE_LABELS[phase]}</div>
        <div class="tl-pips">${pips}</div>
      </div>`;
  }
  // Race day marker
  html += `
    <div class="tl-week phase-race" onclick="goToWeek('race')" style="min-width:80px;flex:0.6;">
      <div class="tl-wnum" style="font-size:16px;">RACE</div>
      <div class="tl-dates">1 May</div>
      <div class="tl-phase">Cardiff</div>
    </div>`;
  bar.innerHTML = html;
}

function renderWeekNav() {
  const list = document.getElementById('week-nav-list');
  const curW = getCurrentPlanWeek();
  let html = '';
  for (let w = 5; w <= 10; w++) {
    const phase = PHASES[w];
    const start = getWeekStartDate(w);
    const end = addDays(start, 6);
    const sessions = getWeekSessions(w).filter(s => !s.rest);
    const pips = sessions.map(s => {
      const st = state[w]?.sessions?.[s.id] || 'none';
      return `<div class="wpip${st==='done'?' done':st==='missed'?' missed':''}"></div>`;
    }).join('');
    const isCurrentReal = w === curW;
    html += `
      <div class="week-item phase-${phase}${w===currentWeek?' active':''}" onclick="goToWeek(${w})">
        <div class="wnum">W${w}</div>
        <div class="winfo">
          ${isCurrentReal ? '<span style="font-family:DM Mono,monospace;font-size:8px;letter-spacing:1px;color:#000;background:var(--accent);padding:1px 5px;display:inline-block;margin-bottom:2px;">NOW</span><br>' : ''}
          <div class="wphase">${PHASE_LABELS[phase]}</div>
          <div class="wdates">${fmtDateShort(start)} – ${fmtDateShort(end)}</div>
          <div class="wprogress">${pips}</div>
        </div>
      </div>`;
  }
  html += `
    <div class="week-item phase-race${currentWeek==='race'?' active':''}" onclick="goToWeek('race')">
      <div class="wnum" style="color:var(--accent2);font-size:14px;">🏁</div>
      <div class="winfo">
        <div class="wphase" style="color:var(--accent2);">Race Day</div>
        <div class="wdates">Thu 1 May 2026</div>
      </div>
    </div>`;
  list.innerHTML = html;
}

function renderContent(week) {
  if (week === 'race') { renderRaceDay(); return; }

  const content = document.getElementById('main-content');
  const phase = PHASES[week];
  const sessions = getWeekSessions(week);
  const liftData = LIFT_WAVE[week];
  const waveName = liftData.wave.replace(' (keep crisp, no PRs)', '');
  const waveData = WENDLER_WAVES[waveName] || WENDLER_WAVES['Deload'];
  const w = state[week].wendler;
  const curW = getCurrentPlanWeek();
  const weekStart = getWeekStartDate(week);
  const weekEnd = addDays(weekStart, 6);

  const currentBanner = week === curW
    ? `<div class="current-week-banner">You are here — week of ${fmtDate(weekStart)} to ${fmtDate(weekEnd)}</div>`
    : '';

  // Wendler sets
  const wendlerHTML = liftData.lifts.map(lift => {
    const lkey = lift.replace(/\s/g,'_').toLowerCase();
    const tm = w[`tm_${lkey}`] || '';
    const setsHTML = waveData.sets.map((set, i) => {
      const kg = tm ? Math.round(parseFloat(tm) * set.pct / 100 / 2.5) * 2.5 : '—';
      const isAmrap = typeof set.reps === 'string' && set.reps.includes('+');
      const amrapVal = w[`amrap_${lkey}_${i}`] || '';
      return `
        <div class="lift-set">
          <span class="set-label">Set ${i+1}: ${set.reps}</span>
          <span style="font-size:9px;color:var(--muted);">${Math.round(set.pct)}% =</span>
          <span style="color:var(--text);font-size:12px;min-width:44px;">${tm ? kg+'kg' : '—'}</span>
        </div>
        ${isAmrap ? `<div class="amrap-row">
          <label>AMRAP reps:</label>
          <input type="number" min="0" placeholder="0" value="${amrapVal}"
            onchange="setWendler(${week},'amrap_${lkey}_${i}',this.value)">
        </div>` : ''}`;
    }).join('');
    return `
      <div class="lift-block">
        <h4>${lift}</h4>
        <div class="tm-row">
          <label>Training Max</label>
          <input type="number" min="0" step="2.5" placeholder="0" value="${tm}"
            onchange="setWendler(${week},'tm_${lkey}',this.value);renderContent(${week})">
          <span style="font-family:DM Mono,monospace;font-size:9px;color:var(--muted);">kg</span>
        </div>
        <div class="lift-sets">${setsHTML}</div>
      </div>`;
  }).join('');

  const sessionsHTML = sessions.map(s => {
    const status = state[week]?.sessions?.[s.id] || 'none';
    const cardClass = `session-card${s.rest?' rest':''}${status==='done'?' done':''}${status==='missed'?' missed':''}`;
    const typeLabels = { strength:'Strength', metcon:'MetCon', running:'Running', hyrox:'Hyrox Specific', aerobic:'Aerobic / Race Sim', recovery:'Recovery' };
    const btns = s.rest ? '' : `
      <div class="session-actions">
        <button class="btn btn-done" onclick="setSession(${week},'${s.id}','${status==='done'?'none':'done'}')">
          ${status==='done'?'✓ Done':'Mark Done'}
        </button>
        <button class="btn btn-missed" onclick="setSession(${week},'${s.id}','${status==='missed'?'none':'missed'}')">
          ${status==='missed'?'✗ Missed':'Missed'}
        </button>
      </div>`;
    return `
      <div class="${cardClass}">
        <div class="session-day">${s.day} <span class="session-date-label">${s.date}</span></div>
        <div class="session-name">${s.name}</div>
        <span class="session-type ${s.type}">${typeLabels[s.type]||s.type}</span>
        <div class="session-detail">${s.detail}</div>
        <div class="session-meta"><span>⏱ ${s.duration}</span><span>RPE ${s.rpe}</span></div>
        ${btns}
      </div>`;
  }).join('');

  const savedNote = state[week].notes || '';

  content.innerHTML = `
    <div class="fade-in">
      <div class="week-header">
        <div class="week-title">WEEK ${week}</div>
        <span class="week-phase-badge ${phase}">${PHASE_LABELS[phase]}</span>
        <div class="week-date-range">${fmtDate(weekStart)} – ${fmtDate(weekEnd)}</div>
        <div class="week-focus">${PHASE_FOCUS[phase]}</div>
      </div>
      ${currentBanner}
      <div class="sessions-grid">${sessionsHTML}</div>
      <div class="wendler-section">
        <h3>Wendler — ${liftData.lifts.join(' + ')} — ${liftData.wave}</h3>
        <p style="font-family:DM Mono,monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:14px;">
          Enter Training Max to auto-calculate sets · ${liftData.note} · Accessory: ${liftData.accessory}
        </p>
        <div class="wendler-lifts">${wendlerHTML}</div>
      </div>
      <div class="notes-area">
        <h3>Week ${week} Notes</h3>
        <textarea placeholder="How did the week go? PRs, energy, partner comms, sleep notes…"
          onchange="setNote(${week},this.value)">${savedNote}</textarea>
      </div>
    </div>`;
}

function renderRaceDay() {
  const content = document.getElementById('main-content');
  content.innerHTML = `
    <div class="fade-in">
      <div class="race-day-card">
        <h2>RACE DAY</h2>
        <p>Thursday, 1 May 2026 — Cardiff</p>
        <div class="race-tips">
          <div class="race-tip">
            <h4>The Night Before</h4>
            <p>Pack kit, sled shoes, gloves. Eat a normal dinner — don't overload. Early bed. Lay everything out.</p>
          </div>
          <div class="race-tip">
            <h4>Morning Fuel</h4>
            <p>Eat 2–3 hrs before. Familiar food — no experiments. Coffee if it's routine. Hydrate from the moment you wake.</p>
          </div>
          <div class="race-tip">
            <h4>Partner Strategy</h4>
            <p>Agree split strategy on each station in advance. Communicate loudly. The first 3km is always faster than it feels — hold back early.</p>
          </div>
          <div class="race-tip">
            <h4>Station Pacing</h4>
            <p>SkiErg: pace yourself — it's station 1. Sled push: explode out. Wall balls: unbroken sets. The last 1km run — everything you've got left.</p>
          </div>
        </div>
      </div>
    </div>`;
}

function goToWeek(w) {
  currentWeek = w;
  renderWeekNav();
  renderTimeline();
  renderContent(w);
  document.getElementById('main-content').scrollTo(0,0);
}

// ---- PRE-POPULATE TMs ----
// Current cycle (W5/W6): 90% of 1RM — Squat 153, Bench 103.5, DL 180, Press 63
// Fresh cycle (W7+): +5kg lower, +2.5kg upper — Squat 158, DL 185, Bench 106, Press 65.5
const DEFAULT_TMS = {
  5:  { tm_squat: 153,   tm_bench_press: 103.5 },
  6:  { tm_deadlift: 180, tm_overhead_press: 63 },
  7:  { tm_squat: 158,   tm_bench_press: 106 },
  8:  { tm_deadlift: 185, tm_overhead_press: 65.5 },
  9:  { tm_squat: 158,   tm_bench_press: 106 },
  10: { tm_squat: 158,   tm_bench_press: 106, tm_deadlift: 185, tm_overhead_press: 65.5 }
};

// ---- INIT ----
loadState();

// Apply default TMs only where user hasn't already entered a value
for (let w = 5; w <= 10; w++) {
  const defaults = DEFAULT_TMS[w] || {};
  for (const [key, val] of Object.entries(defaults)) {
    if (!state[w].wendler[key]) state[w].wendler[key] = val;
  }
}

updateDaysRemaining();
updateStats();
renderTimeline();
renderWeekNav();

// Auto-open current week
const cw = getCurrentPlanWeek();
goToWeek(cw === 'race' ? 'race' : cw);

// Live countdown
setInterval(updateDaysRemaining, 60000);
</script>
</body>
</html>
